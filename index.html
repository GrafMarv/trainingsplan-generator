<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Trainingsplan Generator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; color: #1a1a1a; }
.ui { max-width: 860px; margin: 0 auto; padding: 32px 24px; }
.ui h1 { font-size: 22px; font-weight: 600; margin-bottom: 24px; }
.input-section { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 20px; margin-bottom: 12px; }
label.section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #666; display: block; margin-bottom: 8px; }
input[type=text], select { width: 100%; padding: 10px 12px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 14px; font-family: inherit; color: #1a1a1a; background: #fafafa; }
input[type=text]:focus, select:focus { outline: none; border-color: #999; background: #fff; }
.row { display: flex; gap: 12px; margin-bottom: 10px; }
.row > div { flex: 1; }
.row label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }
.upload-zone { border: 2px dashed #d0d0d0; border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; color: #888; font-size: 13px; }
.upload-zone.loaded { border-color: #4CAF50; color: #4CAF50; }
.db-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.pill { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: #f0f0f0; color: #555; border: 1px solid #e0e0e0; }
.btn-primary { display: block; width: 100%; padding: 13px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; }
.btn-primary:hover { background: #333; }
.btn-secondary { display: inline-block; padding: 10px 20px; background: #fff; color: #1a1a1a; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; cursor: pointer; }
.btn-secondary:hover { background: #f5f5f5; }
.plan-wrapper { display: none; margin-top: 32px; }
.plan-actions { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
.plan-actions span { font-size: 13px; color: #666; }
.a4 { width: 794px; height: 1123px; background: #fff; padding: 28px 32px; border: 1px solid #ccc; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
.plan-header { flex-shrink: 0; border: 1px solid #bbb; border-radius: 4px; padding: 10px 16px; height: 48px; display: flex; align-items: center; }
.plan-header-title { font-size: 16px; font-weight: 600; }
.plan-header-sub { font-size: 12px; color: #777; margin-left: auto; }
.plan-footer { flex-shrink: 0; border: 1px solid #bbb; border-radius: 4px; padding: 10px 16px; height: 36px; display: flex; align-items: center; font-size: 12px; color: #888; }
.exercises-container { flex: 1; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
.exercise-row { flex: 1; display: grid; grid-template-columns: 6px 1fr 1fr; gap: 0 10px; min-height: 0; }
.ex-sidebar { border-radius: 3px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ex-sidebar.no-group { background: #e8e8e8; }
.ex-sidebar .group-label { writing-mode: vertical-rl; text-orientation: mixed; font-size: 10px; font-weight: 700; color: #fff; letter-spacing: 0.05em; transform: rotate(180deg); }
.ex-img-box { border: 1px solid #bbb; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #fafafa; min-height: 0; }
.ex-img-box img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
.ex-img-box .no-img { font-size: 12px; color: #bbb; text-align: center; padding: 8px; }
.ex-info-box { border: 1px solid #bbb; border-radius: 4px; padding: 12px 16px; display: flex; flex-direction: column; justify-content: center; gap: 6px; min-height: 0; overflow: hidden; position: relative; }
.ex-info-box .group-tag { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 4px 4px 0 0; }
.ex-group-badge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
.ex-name-row { display: flex; align-items: center; gap: 8px; }
.ex-name { font-size: 15px; font-weight: 600; }
.ex-metric { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 700; }
.ex-metric img { width: 22px; height: 22px; object-fit: contain; opacity: 0.8; }
.ex-metric-label { font-size: 11px; color: #777; font-weight: 400; }
.ex-sets-row { display: flex; gap: 6px; flex-wrap: wrap; }
.set-bubble { width: 26px; height: 26px; border: 1px solid #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #888; flex-shrink: 0; }
.ex-note { font-size: 11px; color: #888; font-style: italic; }
@media print {
  body { background: #fff; }
  .ui > *:not(.plan-wrapper) { display: none; }
  .plan-actions { display: none !important; }
  .plan-wrapper { display: block !important; margin-top: 0; }
  .a4 { border: none; margin: 0; width: 100%; box-shadow: none; }
  @page { size: A4; margin: 0; }
}
</style>
</head>
<body>
<div class="ui">
  <h1>Trainingsplan Generator</h1>
  <div class="input-section">
    <label class="section-label">Übungsgrafiken laden</label>
    <div class="upload-zone loaded" id="drop-zone" onclick="document.getElementById('file-input').click()">
      5 Demo-Grafiken geladen &ndash; weitere PNG-Dateien per Drag &amp; Drop hinzufügen
      <input type="file" id="file-input" multiple accept=".png" style="display:none;">
    </div>
    <div class="db-pills" id="db-pills"></div>
  </div>
  <div class="input-section">
    <label class="section-label">Plan-Details</label>
    <div class="row">
      <div><label>Planname</label><input type="text" id="plan-name" value="Krafttraining A &ndash; Oberk&ouml;rper"></div>
      <div><label>Footer</label><input type="text" id="plan-footer" value="Coach: Max Mustermann &middot; Athletenname: _______________"></div>
    </div>
  </div>
  <div class="input-section">
    <label class="section-label">&Uuml;bungen</label>
    <div id="exercise-inputs"></div>
    <button class="btn-secondary" onclick="addExercise()" style="margin-top:8px;">+ &Uuml;bung hinzuf&uuml;gen</button>
  </div>
  <button class="btn-primary" onclick="generatePlan()">Trainingsplan generieren</button>
  <div class="plan-wrapper" id="plan-wrapper">
    <div class="plan-actions">
      <button class="btn-secondary" onclick="window.print()">&#128424;&#65039; Drucken / als PDF speichern</button>
      <span>Im Druckdialog "Als PDF speichern" w&auml;hlen</span>
    </div>
    <div class="a4" id="a4">
      <div class="plan-header">
        <span class="plan-header-title" id="out-title"></span>
        <span class="plan-header-sub" id="out-date"></span>
      </div>
      <div class="exercises-container" id="out-exercises"></div>
      <div class="plan-footer" id="out-footer"></div>
    </div>
  </div>
</div>

const imageDB = {};
let exCount = 0;
const TIMER_IMG = ASSETS['timer'];
const REPS_IMG = ASSETS['reps'];
const GROUP_COLORS = {A:'#2563EB',B:'#EA580C',C:'#16A34A',D:'#9333EA',E:'#DB2777',F:'#0891B2','-':'#d0d0d0'};

Object.entries(ASSETS).forEach(([k,v]) => { if (k !== 'timer' && k !== 'reps') imageDB[k] = v; });
updatePills();

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
dropZone.addEventListener('dragover', e => e.preventDefault());
dropZone.addEventListener('drop', e => { e.preventDefault(); loadFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => loadFiles(e.target.files));

function loadFiles(files) {
  Array.from(files).forEach(file => {
    if (!file.name.endsWith('.png')) return;
    const key = file.name.replace('.png','');
    const reader = new FileReader();
    reader.onload = e => { imageDB[key] = e.target.result; updatePills(); };
    reader.readAsDataURL(file);
  });
  dropZone.textContent = Object.keys(imageDB).length + ' Grafiken geladen';
}

function updatePills() {
  document.getElementById('db-pills').innerHTML = Object.keys(imageDB).map(k => {
    const name = k.replace(/_strength_.+|_jump_.+|_mobility_.+|_sprint_.+|_misc/,'').replace(/-/g,' ');
    return `<span class="pill">${name}</span>`;
  }).join('');
}

function addExercise(data) {
  exCount++;
  const id = exCount;
  const groupOptions = ['-','A','B','C','D','E','F'].map(g =>
    `<option value="${g}" ${data?.group===g?'selected':''}>${g === '-' ? 'Keine Gruppe' : 'Gruppe ' + g}</option>`
  ).join('');
  const div = document.createElement('div');
  div.id = 'ex-' + id;
  div.style.cssText = 'border:1px solid #eee;border-radius:8px;padding:12px;margin-bottom:10px;background:#fafafa;';
  div.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <strong style="font-size:13px;">Übung ${id}</strong>
      <button onclick="document.getElementById('ex-${id}').remove()" style="background:none;border:none;cursor:pointer;color:#999;font-size:18px;">×</button>
    </div>
    <div class="row">
      <div><label>Name</label><input type="text" class="ex-name-inp" placeholder="z.B. Pull-up" value="${data?.name||''}"></div>
      <div><label>Bildname</label><input type="text" class="ex-key-inp" placeholder="z.B. pull-up_strength_..." value="${data?.key||''}"></div>
    </div>
    <div class="row">
      <div><label>Gruppe / Superset</label><select class="ex-group-inp">${groupOptions}</select></div>
      <div><label>Typ</label>
        <select class="ex-type-inp">
          <option value="reps" ${data?.type==='reps'?'selected':''}>Wiederholungen</option>
          <option value="time" ${data?.type==='time'?'selected':''}>Zeit</option>
        </select>
      </div>
      <div><label>Sätze</label><input type="text" class="ex-sets-inp" placeholder="3" value="${data?.sets||'3'}"></div>
      <div><label>Wdh. / Sek.</label><input type="text" class="ex-reps-inp" placeholder="10" value="${data?.reps||''}"></div>
    </div>
    <div><label>Notiz</label><input type="text" class="ex-note-inp" placeholder="optional" value="${data?.note||''}"></div>
  `;
  document.getElementById('exercise-inputs').appendChild(div);
}

[
  {name:'Pull-up', key:'pull-up_strength_upper_pull_dyn_bi', group:'A', type:'reps', sets:'4', reps:'6-8'},
  {name:'Tripod Row (Kettlebell)', key:'tripod-row-kettlebell_strength_upper_pull_dyn_uni', group:'A', type:'reps', sets:'4', reps:'10'},
  {name:'Split Squat (Barbell)', key:'split-squat-barbell_strength_lower_push_dyn_uni', group:'B', type:'reps', sets:'3', reps:'10'},
  {name:'Reverse Crunch', key:'reverse-crunch_strength_upper_core_dyn_bi', group:'B', type:'reps', sets:'3', reps:'15'},
  {name:'Incline Dumbbell Press', key:'incline-dumbbell-press_strength_upper_push_dyn_bi', group:'-', type:'reps', sets:'3', reps:'12'},
].forEach(addExercise);

function findImage(key, name) {
  if (key && imageDB[key]) return imageDB[key];
  const search = (name||'').toLowerCase().replace(/ /g,'-');
  for (const k of Object.keys(imageDB)) {
    if (k.startsWith(search)) return imageDB[k];
  }
  return null;
}

function buildGroupCounters(exercises) {
  const counters = {};
  return exercises.map(ex => {
    if (ex.group === '-') return null;
    counters[ex.group] = (counters[ex.group] || 0) + 1;
    return counters[ex.group];
  });
}

function generatePlan() {
  const inputs = document.querySelectorAll('[id^="ex-"]');
  const exercises = [];
  inputs.forEach(div => {
    const name = div.querySelector('.ex-name-inp').value.trim();
    if (!name) return;
    exercises.push({
      name, key: div.querySelector('.ex-key-inp').value.trim(),
      group: div.querySelector('.ex-group-inp').value,
      type: div.querySelector('.ex-type-inp').value,
      sets: parseInt(div.querySelector('.ex-sets-inp').value)||3,
      reps: div.querySelector('.ex-reps-inp').value.trim()||'10',
      note: div.querySelector('.ex-note-inp').value.trim(),
    });
  });
  if (!exercises.length) return;

  document.getElementById('out-title').textContent = document.getElementById('plan-name').value||'Trainingsplan';
  document.getElementById('out-date').textContent = new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('out-footer').textContent = document.getElementById('plan-footer').value;

  const container = document.getElementById('out-exercises');
  container.innerHTML = '';
  const groupPositions = buildGroupCounters(exercises);

  exercises.forEach((ex, idx) => {
    const img = findImage(ex.key, ex.name);
    const symbolImg = ex.type === 'time' ? TIMER_IMG : REPS_IMG;
    const metricLabel = ex.type === 'time' ? 'Sek.' : 'Wdh.';
    const color = GROUP_COLORS[ex.group] || '#d0d0d0';
    const hasGroup = ex.group !== '-';
    const pos = groupPositions[idx];
    const badgeLabel = hasGroup ? ex.group + pos : '';

    const row = document.createElement('div');
    row.className = 'exercise-row';

    const sidebar = document.createElement('div');
    sidebar.className = 'ex-sidebar' + (hasGroup ? '' : ' no-group');
    sidebar.style.background = color;
    if (hasGroup) sidebar.innerHTML = `<span class="group-label">${ex.group}</span>`;

    const imgBox = document.createElement('div');
    imgBox.className = 'ex-img-box';
    imgBox.style.borderLeft = hasGroup ? `3px solid ${color}` : '1px solid #bbb';
    imgBox.innerHTML = img ? `<img src="${img}" alt="${ex.name}">` : `<div class="no-img">Keine Grafik<br><small>${ex.key||ex.name}</small></div>`;

    const infoBox = document.createElement('div');
    infoBox.className = 'ex-info-box';
    infoBox.style.borderLeft = hasGroup ? `3px solid ${color}` : '1px solid #bbb';
    const setsHtml = Array.from({length: ex.sets}, (_,i) => `<div class="set-bubble">${i+1}</div>`).join('');
    infoBox.innerHTML = `
      ${hasGroup ? `<div class="group-tag" style="background:${color}"></div>` : ''}
      <div class="ex-name-row">
        ${hasGroup ? `<div class="ex-group-badge" style="background:${color}">${badgeLabel}</div>` : ''}
        <div class="ex-name">${ex.name}</div>
      </div>
      <div class="ex-metric">
        <img src="${symbolImg}" alt="${metricLabel}">
        <span>${ex.reps}</span>
        <span class="ex-metric-label">${metricLabel}</span>
      </div>
      <div style="font-size:12px;color:#555;"><strong>${ex.sets}</strong> Sätze</div>
      <div class="ex-sets-row">${setsHtml}</div>
      ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
    `;

    row.appendChild(sidebar);
    row.appendChild(imgBox);
    row.appendChild(infoBox);
    container.appendChild(row);
  });

  document.getElementById('plan-wrapper').style.display = 'block';
  document.getElementById('plan-wrapper').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
