<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainingsplan Generator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; color: #1a1a1a; }
.ui { max-width: 860px; margin: 0 auto; padding: 32px 24px; }
.ui h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
.ui p.subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
.input-section { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 20px; margin-bottom: 12px; }
label.section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #666; display: block; margin-bottom: 8px; }
input[type=text], textarea, select { width: 100%; padding: 10px 12px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 14px; font-family: inherit; color: #1a1a1a; background: #fafafa; }
input[type=text]:focus, textarea:focus, select:focus { outline: none; border-color: #999; background: #fff; }
textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
.row { display: flex; gap: 12px; margin-bottom: 10px; }
.row > div { flex: 1; }
.row label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }
.btn-primary { display: block; width: 100%; padding: 13px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; }
.btn-primary:hover { background: #333; }
.btn-primary:disabled { background: #999; cursor: not-allowed; }
.btn-secondary { display: inline-block; padding: 10px 20px; background: #fff; color: #1a1a1a; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; cursor: pointer; }
.btn-secondary:hover { background: #f5f5f5; }
.status-box { background: #f0f4ff; border: 1px solid #c0d0ff; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #333; margin-top: 8px; display: none; }
.status-box.error { background: #fff0f0; border-color: #ffc0c0; color: #c00; }
.plan-wrapper { display: none; margin-top: 32px; }
.plan-actions { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
.plan-actions span { font-size: 13px; color: #666; }
.a4 { width: 794px; height: 1123px; background: #fff; padding: 28px 32px; border: 1px solid #ccc; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
.plan-header { flex-shrink: 0; border: 1px solid #bbb; border-radius: 4px; padding: 10px 16px; height: 48px; display: flex; align-items: center; }
.plan-header-title { font-size: 16px; font-weight: 600; }
.plan-header-sub { font-size: 12px; color: #777; margin-left: auto; }
.plan-footer { flex-shrink: 0; border: 1px solid #bbb; border-radius: 4px; padding: 10px 16px; height: 36px; display: flex; align-items: center; font-size: 12px; color: #888; }
.exercises-container { flex: 1; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
.exercise-row { flex: 1; display: grid; grid-template-columns: 6px 1fr 1fr; gap: 0 10px; min-height: 0; }
.ex-sidebar { border-radius: 3px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ex-sidebar.no-group { background: #e8e8e8; }
.ex-sidebar .group-label { writing-mode: vertical-rl; text-orientation: mixed; font-size: 10px; font-weight: 700; color: #fff; letter-spacing: 0.05em; transform: rotate(180deg); }
.ex-img-box { border: 1px solid #bbb; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #fafafa; min-height: 0; }
.ex-img-box img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
.ex-img-box .no-img { font-size: 12px; color: #bbb; text-align: center; padding: 8px; }
.ex-info-box { border: 1px solid #bbb; border-radius: 4px; padding: 12px 16px; display: flex; flex-direction: column; justify-content: center; gap: 6px; min-height: 0; overflow: hidden; position: relative; }
.ex-info-box .group-tag { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 4px 4px 0 0; }
.ex-group-badge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
.ex-name-row { display: flex; align-items: center; gap: 8px; }
.ex-name { font-size: 15px; font-weight: 600; }
.ex-metric { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 700; }
.ex-metric-label { font-size: 11px; color: #777; font-weight: 400; }
.ex-sets-row { display: flex; gap: 6px; flex-wrap: wrap; }
.set-bubble { width: 26px; height: 26px; border: 1px solid #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #888; flex-shrink: 0; }
.ex-note { font-size: 11px; color: #888; font-style: italic; }
@media print {
  body { background: #fff; }
  .ui > *:not(.plan-wrapper) { display: none; }
  .plan-actions { display: none !important; }
  .plan-wrapper { display: block !important; margin-top: 0; }
  .a4 { border: none; margin: 0; width: 100%; box-shadow: none; }
  @page { size: A4; margin: 0; }
}
</style>
</head>
<body>
<div class="ui">
  <h1>Trainingsplan Generator</h1>
  <p class="subtitle">Beschreibe deinen Trainingsplan in einem Satz – die KI erstellt ihn automatisch.</p>

  <div class="input-section">
    <label class="section-label">Trainingsplan beschreiben</label>
    <textarea id="ki-input" placeholder="z.B. 4 Sätze Pull-up Superset mit Tripod Row, dann 3x10 Split Squat, zum Schluss 3 Sätze Incline Press"></textarea>
    <div class="row" style="margin-top:10px;">
      <div><label>Planname</label><input type="text" id="plan-name" value="Krafttraining A"></div>
      <div><label>Footer</label><input type="text" id="plan-footer" value="Coach: _______________ · Athlet: _______________"></div>
    </div>
    <button class="btn-primary" id="generate-btn" onclick="generateWithAI()">&#10024; Trainingsplan generieren</button>
    <div class="status-box" id="status-box"></div>
  </div>

  <div class="plan-wrapper" id="plan-wrapper">
    <div class="plan-actions">
      <button class="btn-secondary" onclick="window.print()">&#128424;&#65039; Drucken / als PDF</button>
      <button class="btn-secondary" onclick="resetPlan()">&#8635; Neu generieren</button>
      <span>Im Druckdialog "Als PDF speichern" w&auml;hlen</span>
    </div>
    <div class="a4" id="a4">
      <div class="plan-header">
        <span class="plan-header-title" id="out-title"></span>
        <span class="plan-header-sub" id="out-date"></span>
      </div>
      <div class="exercises-container" id="out-exercises"></div>
      <div class="plan-footer" id="out-footer"></div>
    </div>
  </div>
</div>

<script>
const GITHUB_RAW = 'https://raw.githubusercontent.com/GrafMarv/trainingsplan-generator/main/exercises/';
const GROUP_COLORS = {A:'#2563EB',B:'#EA580C',C:'#16A34A',D:'#9333EA',E:'#DB2777',F:'#0891B2','-':'#d0d0d0'};

const EXERCISES = [
  'air-squat_strength_lower_push_dyn_bi',
  'wall-sit_strength_lower_push_sta_bi',
  'copenhagen-plank_strength_lower_adduction_sta_uni',
  'single-leg-deadlift_strength_lower_pull_dyn_uni',
  'single-leg-glute-bridge_strength_lower_pull_sta_uni',
  'glute-bridge_strength_lower_pull_sta_bi',
  'side-plank_strength_upper_core_sta_uni',
  'plank_strength_upper_core_sta_bi',
  'dead-bug_strength_upper_core_dyn_bi',
  'australian-pull-up_strength_upper_pull_dyn_bi',
  'chin-up_strength_upper_pull_dyn_bi',
  'single-leg-calf-raise_strength_lower_push_sta_uni',
  'calf-raise_strength_lower_push_sta_bi',
  'single-leg-calf-raise_strength_lower_push_dyn_uni',
  'calf-raise_strength_lower_push_dyn_bi',
  'hollow-body-hold_strength_upper_core_sta_bi',
  'nordic-curl_strength_lower_pull_dyn_bi',
  'pull-up_strength_upper_pull_dyn_bi',
  'barbell-hip-thrust_strength_lower_pull_dyn_bi',
  'bulgarian-split-squat-kettlebell_strength_lower_push_dyn_uni',
  'goblet-squat-kettlebell_strength_lower_push_dyn_bi',
  'back-squat-barbell_strength_lower_push_dyn_bi',
  'bench-press-barbell_strength_upper_push_dyn_bi',
  'incline-dumbbell-press_strength_upper_push_dyn_bi',
  'split-squat-barbell_strength_lower_push_dyn_uni',
  'landmine-press-half-kneeling_strength_upper_push_dyn_uni',
  'landmine-press-standing_strength_upper_push_dyn_bi',
  'pallof-press-band_strength_upper_core_dyn_bi',
  'tripod-row-kettlebell_strength_upper_pull_dyn_uni',
  'hamstring-walkout_strength_lower_pull_dyn_bi',
  'y-raise_strength_upper_pull_dyn_bi',
  'reverse-plank_strength_upper_core_sta_bi',
  'box-squat_strength_lower_push_dyn_bi',
  'single-leg-box-squat_strength_lower_push_dyn_uni',
  'reverse-crunch_strength_upper_core_dyn_bi',
  'bird-dog_strength_upper_core_dyn_bi',
  'counter-movement-jump_jump_vertical_jump',
  'squat-jump_jump_vertical_jump',
  'drop-jump_jump_vertical_jump',
  'pogo-jump_jump_vertical_jump',
  'hand-walk_mobility_full_body_dyn',
  'world-greatest-stretch_mobility_full_body_dyn',
  'couch-stretch_mobility_lower_sta'
];

async function generateWithAI() {
  const input = document.getElementById('ki-input').value.trim();
  if (!input) return;

  const btn = document.getElementById('generate-btn');
  const status = document.getElementById('status-box');
  btn.disabled = true;
  btn.textContent = 'KI generiert deinen Plan...';
  status.style.display = 'block';
  status.className = 'status-box';
  status.textContent = 'KI analysiert deine Eingabe...';
  document.getElementById('plan-wrapper').style.display = 'none';

  try {
    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ input, exercises: EXERCISES.join(', ') })
    });

    if (!response.ok) throw new Error('API Fehler');
    const data = await response.json();
    
    status.style.display = 'none';
    renderPlan(data.plan);
  } catch(e) {
    status.className = 'status-box error';
    status.textContent = 'Fehler: ' + e.message;
  }

  btn.disabled = false;
  btn.textContent = '✨ Trainingsplan generieren';
}

function resetPlan() {
  document.getElementById('plan-wrapper').style.display = 'none';
  document.getElementById('ki-input').focus();
}

function buildGroupCounters(exercises) {
  const counters = {};
  return exercises.map(ex => {
    if (!ex.group || ex.group === '-') return null;
    counters[ex.group] = (counters[ex.group] || 0) + 1;
    return counters[ex.group];
  });
}

function renderPlan(exercises) {
  document.getElementById('out-title').textContent = document.getElementById('plan-name').value || 'Trainingsplan';
  document.getElementById('out-date').textContent = new Date().toLocaleDateString('de-DE', {day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('out-footer').textContent = document.getElementById('plan-footer').value;

  const container = document.getElementById('out-exercises');
  container.innerHTML = '';
  const groupPositions = buildGroupCounters(exercises);

  exercises.forEach((ex, idx) => {
    const group = ex.group || '-';
    const color = GROUP_COLORS[group] || '#d0d0d0';
    const hasGroup = group !== '-';
    const pos = groupPositions[idx];
    const badgeLabel = hasGroup ? group + pos : '';
    const metricLabel = ex.type === 'time' ? 'Sek.' : 'Wdh.';
    const imgSrc = ex.imageKey ? GITHUB_RAW + ex.imageKey + '.png' : null;

    const row = document.createElement('div');
    row.className = 'exercise-row';

    const sidebar = document.createElement('div');
    sidebar.className = 'ex-sidebar' + (hasGroup ? '' : ' no-group');
    sidebar.style.background = color;
    if (hasGroup) sidebar.innerHTML = `<span class="group-label">${group}</span>`;

    const imgBox = document.createElement('div');
    imgBox.className = 'ex-img-box';
    imgBox.style.borderLeft = hasGroup ? `3px solid ${color}` : '1px solid #bbb';
    if (imgSrc) {
      const img = document.createElement('img');
      img.src = imgSrc;
      img.alt = ex.exercise;
      img.onerror = () => { imgBox.innerHTML = `<div class="no-img">Keine Grafik</div>`; };
      imgBox.appendChild(img);
    } else {
      imgBox.innerHTML = `<div class="no-img">Keine Grafik</div>`;
    }

    const infoBox = document.createElement('div');
    infoBox.className = 'ex-info-box';
    infoBox.style.borderLeft = hasGroup ? `3px solid ${color}` : '1px solid #bbb';
    const setsHtml = Array.from({length: ex.sets}, (_,i) => `<div class="set-bubble">${i+1}</div>`).join('');
    infoBox.innerHTML = `
      ${hasGroup ? `<div class="group-tag" style="background:${color}"></div>` : ''}
      <div class="ex-name-row">
        ${hasGroup ? `<div class="ex-group-badge" style="background:${color}">${badgeLabel}</div>` : ''}
        <div class="ex-name">${ex.exercise}</div>
      </div>
      <div class="ex-metric">
        <span>${ex.reps}</span>
        <span class="ex-metric-label">${metricLabel}</span>
      </div>
      <div style="font-size:12px;color:#555;"><strong>${ex.sets}</strong> S&auml;tze</div>
      <div class="ex-sets-row">${setsHtml}</div>
      ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
    `;

    row.appendChild(sidebar);
    row.appendChild(imgBox);
    row.appendChild(infoBox);
    container.appendChild(row);
  });

  document.getElementById('plan-wrapper').style.display = 'block';
  document.getElementById('plan-wrapper').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
